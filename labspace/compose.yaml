# This Docker Compose file allows you to run the Labspace locally for development.
# It uses the Docker Labspace content-dev base.

include:
  - oci://docker.io/dockersamples/labspace-content-dev:latest

services:
  configurator:
    environment:
      PROJECT_CLONE_URL: https://github.com/DockerSecurity-io/commandos-v1.5

  interface:
    volumes:
      - ./instructions:/labspace/instructions:ro

  workspace:
    # Build the custom workspace image from the repo root so the
    # student project files are baked into /home/coder/project.
    build:
      context: ..
      dockerfile: labspace/Dockerfile.workspace
    image: aerabi/docker-commandos-workspace
    # The included labspace-content-dev bundle stages repo content into the
    # labspace-content volume, which the workspace mounts at /home/coder/project.
    volumes:
      - ../cpp:/home/coder/project/cpp:ro
      - ../flask:/home/coder/project/flash:ro
      - ../flask-init:/home/coder/project/flask-init:ro
      - ../installation.md:/home/coder/project/installation.md:ro
      - ../Makefile:/home/coder/project/Makefile:ro
      - ../README.md:/home/coder/project/README.md:ro
